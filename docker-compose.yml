services:

  db:
    image: postgres:16-alpine
    container_name: jerney-db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - jerney-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jerney-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "5000"
      NODE_ENV: "production"
    expose:
      - "5000"
    networks:
      - jerney-network
    depends_on:
      db:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jerney-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    networks:
      - jerney-network
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true

volumes:
  postgres-data:
    driver: local

networks:
  jerney-network:
    driver: bridge