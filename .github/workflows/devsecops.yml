name: Jerney DevSecOps Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:

  lint:
    name: "Lint — ${{ matrix.component }}"
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.component }}

      - name: Run ESLint
        run: npm run lint
        working-directory: ${{ matrix.component }}

  sca:
    name: "SCA — ${{ matrix.component }}"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.component }}

      - name: Run npm audit
        run: npm audit --audit-level=high
        working-directory: ${{ matrix.component }}
        continue-on-error: true